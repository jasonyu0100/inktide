<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Rotated view with thick arrows -->
    <linearGradient id="red" gradientUnits="userSpaceOnUse" x1="220" y1="290" x2="390" y2="130">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="green" gradientUnits="userSpaceOnUse" x1="220" y1="290" x2="80" y2="225">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="blue" gradientUnits="userSpaceOnUse" x1="220" y1="290" x2="275" y2="420">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>

    <!-- Thick arrow markers -->
    <marker id="arrow-red" markerWidth="3" markerHeight="3" refX="1.5" refY="1.5" orient="auto">
      <polygon points="0,0 3,1.5 0,3" fill="#f87171"/>
    </marker>
    <marker id="arrow-green" markerWidth="3" markerHeight="3" refX="1.5" refY="1.5" orient="auto">
      <polygon points="0,0 3,1.5 0,3" fill="#4ade80"/>
    </marker>
    <marker id="arrow-blue" markerWidth="3" markerHeight="3" refX="1.5" refY="1.5" orient="auto">
      <polygon points="0,0 3,1.5 0,3" fill="#60a5fa"/>
    </marker>
  </defs>

  <g fill="none" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <!-- Origin at (220, 290) - tilted right view -->

    <!-- Green axis - going left -->
    <path d="M220 290 L80 225" stroke="url(#green)" marker-end="url(#arrow-green)"/>

    <!-- Blue axis - going down -->
    <path d="M220 290 L275 420" stroke="url(#blue)" marker-end="url(#arrow-blue)"/>

    <!-- Red axis - going upper-right -->
    <path d="M220 290 L390 130" stroke="url(#red)" marker-end="url(#arrow-red)"/>
  </g>
</svg>
